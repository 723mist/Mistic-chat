<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chat/style.css">
    <title>Chat - Mistic-Chat</title>
</head>
<body>
    <div id="app">
        <div id="chats">
            <div class="other_user_chats">NAME</div>
            <div class="other_user_status_chats">STATUS</div>
        </div>
        <div id="users_chat">
            <div id="up_bar">
                <div>IDK USER IMG</div>
                <div class="other_user_name">TEST NAME OF OTHER USER</div>
                <div class="other_user_status">TEST OF STATUS(online)</div>
            </div>
            <div id="chat">
                <div>ITS A TEST</div>
            </div>
            <div id="interaction_menu">
                <button class="files">F</button>
                <input class="message" placeholder="Type your message here...">
                <button class="send">S</button>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
